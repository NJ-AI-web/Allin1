name: erode_superapp
description: Erode All-in-One Super App - Multi-vendor Commerce MVP by NJ TECH
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ================================================================
  # HTTP & API (Upgraded from http to Dio)
  # ================================================================
  dio: ^5.4.0          # Advanced HTTP client with interceptors, retry logic
  http: ^1.2.1         # Kept for backward compatibility during migration

  # ================================================================
  # Firebase (Backend Services)
  # ================================================================
  firebase_core: ^4.5.0        # Required for all Firebase services
  firebase_analytics: any  # Event tracking and user analytics
  firebase_crashlytics: any
  firebase_performance: any
  cloud_functions: ^6.0.7

  # ================================================================
  # Local Storage & Caching
  # ================================================================
  hive_flutter: ^1.1.0   # Fast, lightweight NoSQL database for caching
  hive: ^2.2.3           # Core Hive package

  # ================================================================
  # UI & Styling
  # ================================================================
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  flutter_animate: ^4.5.0

  # ================================================================
  # Utilities
  # ================================================================
  uuid: ^4.4.0           # Unique ID generation for requests
  intl: ^0.19.0          # Internationalization
  url_launcher: ^6.3.0   # Launch URLs (WhatsApp, etc.)
  file_picker: ^8.1.2    # File picker for document uploads
  provider: ^6.1.2       # State management

  # ================================================================
  # Speech
  # ================================================================
  speech_to_text: ^7.3.0

  # ================================================================
  # Markdown Rendering (for AI responses)
  # ================================================================
  flutter_markdown: ^0.6.22

  # ================================================================
  # Icons
  # ================================================================
  cupertino_icons: ^1.0.8

  # ================================================================
  # Security & Encryption
  # ================================================================
  flutter_secure_storage: ^10.0.0  # Secure storage for encryption keys
  encrypt: ^5.0.3                 # AES encryption
  pointycastle: ^3.9.1             # Cryptographic primitives (PBKDF2)
  crypto: ^3.0.3                  # SHA-256 for checksums
  bcrypt: ^1.1.3                  # Password hashing
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^11.3.1
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1    # Code generation for Hive
  build_runner: ^2.4.8      # Required for code generation

flutter:
  uses-material-design: true
  assets:
    - assets/

  # PWA / Web
  # Ensure web/index.html has: <meta name="theme-color" content="#0A0A12">
