# ================================================================
# GitHub Actions Workflow - Erode Super App
# ================================================================
# CI/CD pipeline for automated testing, analysis, and deployment.
#
# Triggers:
# - Push to main/develop branches
# - Pull requests
# - Manual trigger
#
# Jobs:
# 1. Test - Run all tests with coverage
# 2. Analyze - Code quality and security checks
# 3. Build - Build for all platforms
# 4. Deploy - Deploy to stores (manual approval)
# ================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy to production stores'
        required: false
        default: 'false'

# ================================================================
# Environment Variables
# ================================================================
env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

# ================================================================
# Jobs
# ================================================================
jobs:
  # ============================================================
  # Job 1: Test - Run all tests with coverage
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Check test coverage
        uses: VeryGoodOpenSource/very_good_coverage@v2
        with:
          path: coverage/lcov.info
          min_coverage: 75.0  # Target 75% minimum coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            test_results/

  # ============================================================
  # Job 2: Analyze - Code quality and security checks
  # ============================================================
  analyze:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install dart_code_metrics
        run: dart pub global activate dart_code_metrics

      - name: Run code metrics
        run: |
          dart code metrics analyze lib \
            --reporter=console \
            --reporter=github \
            --fatal-style \
            --fatal-performance \
            --fatal-warnings
        continue-on-error: true

      - name: Check for security issues
        run: |
          # Check for hardcoded secrets
          if grep -r "API_KEY=" lib/ --include="*.dart" | grep -v "flutter_dotenv"; then
            echo "::error::Hardcoded API key detected!"
            exit 1
          fi
          
          # Check for hardcoded URLs without environment variables
          if grep -r "https://.*\.hf\.space" lib/ --include="*.dart" | grep -v "flutter_dotenv" | grep -v "api_config"; then
            echo "::warning::Hardcoded URL detected - consider using environment variables"
          fi

      - name: Check for TODO comments
        run: |
          TODO_COUNT=$(grep -r "TODO" lib/ --include="*.dart" | wc -l)
          echo "Found $TODO_COUNT TODO comments"
          echo "TODO_COUNT=$TODO_COUNT" >> $GITHUB_ENV

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: metrics/

  # ============================================================
  # Job 3: Build - Build for all platforms
  # ============================================================
  build:
    name: Build Applications
    runs-on: ${{ matrix.os }}
    needs: [test, analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            target: apk
          - platform: ios
            os: macos-latest
            target: ipa
          - platform: web
            os: ubuntu-latest
            target: web
          - platform: windows
            os: windows-latest
            target: exe
          - platform: linux
            os: ubuntu-latest
            target: appimage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build for ${{ matrix.platform }}
        run: |
          case ${{ matrix.platform }} in
            android)
              flutter build apk --release --split-per-abi
              flutter build appbundle --release
              ;;
            ios)
              flutter build ios --release --no-codesign
              ;;
            web)
              flutter build web --release
              ;;
            windows)
              flutter build windows --release
              ;;
            linux)
              flutter build linux --release
              ;;
          esac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            build/app/outputs/**/*.apk
            build/app/outputs/**/*.aab
            build/ios/**/*.ipa
            build/web/**
            build/windows/**/*.exe
            build/linux/**/*.AppImage
          retention-days: 30

  # ============================================================
  # Job 4: Security Scan - Dependency and vulnerability check
  # ============================================================
  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run pub outdated
        run: flutter pub outdated

      - name: Run pub audit (if available)
        run: dart pub global activate dart_code_metrics && dart pub global run dart_code_metrics:metrics check-unnecessary --sdk-path=lib/
        continue-on-error: true

      - name: Check for known vulnerabilities
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pubspec = fs.readFileSync('pubspec.yaml', 'utf8');
            
            // Check for outdated or vulnerable packages
            const vulnerablePackages = [
              // Add known vulnerable packages here
            ];
            
            vulnerablePackages.forEach(pkg => {
              if (pubspec.includes(pkg)) {
                core.setFailed(`Vulnerable package detected: ${pkg}`);
              }
            });

  # ============================================================
  # Job 5: Deploy - Deploy to stores (requires approval)
  # ============================================================
  deploy:
    name: Deploy to Stores
    runs-on: ubuntu-latest
    needs: [test, analyze, build, security_scan]
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://play.google.com/store/apps/details?id=com.njtech.erode_superapp
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-android
          path: build/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Deploy to Google Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.njtech.erode_superapp
          releaseFiles: build/app/outputs/flutter-apk/app-release.apk
          track: internal
          status: completed
        if: github.event.inputs.deploy_to_production == 'true'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Erode Super App ${{ github.ref_name }} deployed to production!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Deployment Successful*\nVersion: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: github.event.inputs.deploy_to_production == 'true'

  # ============================================================
  # Job 6: Notify - Send notifications
  # ============================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [test, analyze, build]
    if: always()
    
    steps:
      - name: Check job status
        id: check
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.analyze.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Notify failure
        uses: actions/github-script@v7
        if: steps.check.outputs.status == 'failed'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI/CD pipeline failed. Please check the workflow logs.'
            })

